<aside class="sidebar">
    <a routerLink="/home" class="brand">JiraniFind</a>
    <nav>
        <p class="nav-heading">MAIN MENU</p>
        <ul>
            <li
                routerLink="/admin-dashboard"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </li>
            <li routerLink="/pending-items" routerLinkActive="active">
                <i class="fa-solid fa-magnifying-glass"></i> Pending Reviews
            </li>
            <li routerLink="/manage-users" routerLinkActive="active">
                <i class="fa-regular fa-file-lines"></i> Manage Users
            </li>
            <li routerLink="/manage-claims" routerLinkActive="active">
                <i class="fa-regular fa-comment-dots"></i> Manage Claims
            </li>
        </ul>
    </nav>
    <div class="sidebar-footer">
        <button type="button" class="logout" (click)="logout()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
    </div>
</aside>
