<aside class="sidebar">
    <a routerLink="/home" class="brand">JiraniFind</a>
    <nav>
        <p class="nav-heading">MAIN MENU</p>
        <ul>
            <li
                routerLink="/admin-dashboard"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </li>
            <li routerLink="/pending-items" routerLinkActive="active">
                <i class="fa-solid fa-magnifying-glass"></i> Browse Items
            </li>
            <li routerLink="/manage-claims" routerLinkActive="active">
                <i class="fa-regular fa-file-lines"></i> My Reports
            </li>
            <li routerLink="/manage-claims">
                <i class="fa-regular fa-comment-dots"></i> Claims
            </li>
        </ul>
        <p class="nav-heading">ADMINISTRATION</p>
        <ul>
            <li routerLink="/admin-dashboard">Admin Overview</li>
            <li routerLink="/pending-items" routerLinkActive="active">Pending Review</li>
            <li routerLink="/manage-users" routerLinkActive="active">User Control</li>
        </ul>
    </nav>
    <div class="sidebar-bottom">
        <a routerLink="/report-item" class="btn-report">Report New Item</a>
        <button type="button" class="logout-btn" (click)="logout()">Logout</button>
    </div>
</aside>
